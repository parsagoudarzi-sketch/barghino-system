<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barghino | پروفایل کاربر</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-deep: #0a0e17;
            --bg-gradient-start: #0a0e17;
            --bg-gradient-end: #0d121e;
            --bg-card: #111827cc;
            --cyan: #00e5ff;
            --cyan-glow: #00e5ff66;
            --green: #00ff88;
            --red: #ff4757;
            --gold: #ffb700;
            --border: #1e2d40;
            --input-bg: #1a1f2e;
            --text-primary: #ffffff;
            --text-muted: #8899aa;
            --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(0, 229, 255, 0.15);
            --radius: 24px;
        }

        body {
            font-family: 'Segoe UI', 'Vazirmatn', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
        }

        .circuit-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 12px var(--cyan-glow);
            animation: floatUp linear infinite;
            opacity: 0;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(0) scale(1);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-110vh) scale(0.2);
                opacity: 0;
            }
        }

        /* ===== هدر ===== */
        .profile-header {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
            position: relative;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }

        .logo-img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(0, 229, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 229, 255, 0.2);
        }

        .header-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 18px;
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-primary);
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .header-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0, 229, 255, 0.05);
        }

        /* ===== محتوا ===== */
        .profile-main {
            position: relative;
            z-index: 10;
            max-width: 1000px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            width: 100%;
        }

        .profile-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 2rem;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
        }

        .profile-card:hover {
            box-shadow: var(--shadow-glow);
            border-color: var(--cyan);
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: #0a0e17;
            margin: 0 auto 1rem;
        }

        .profile-name {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .profile-username {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        /* ===== آمار ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1.5rem;
            margin-top: 1.5rem;
        }

        .stat-item {
            text-align: center;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .stat-item .number {
            font-size: 2rem;
            font-weight: 700;
            color: var(--cyan);
        }

        .stat-item .label {
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }

        .stat-item .saving-number {
            color: var(--green);
        }

        /* ===== نمودار ===== */
        .chart-container {
            margin-top: 2rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            height: 300px;
        }

        #consumptionChart {
            width: 100%;
            height: 100%;
        }

        .chart-buttons {
            display: flex;
            gap: 0.8rem;
            margin-top: 1rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .chart-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 6px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .chart-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
        }

        .chart-btn.active {
            background: rgba(0, 229, 255, 0.15);
            border-color: var(--cyan);
            color: var(--cyan);
        }

        /* ===== کپی‌رایت ===== */
        .copyright {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.7rem;
            padding: 1rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .profile-header {
                flex-direction: column;
                text-align: center;
            }
            .stats-grid {
                grid-template-columns: 1fr 1fr;
            }
            .logo-img {
                width: 40px;
                height: 40px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ===== پس‌زمینه متحرک ===== -->
    <div class="circuit-bg"><canvas id="circuitCanvas"></canvas></div>
    <div class="particles" id="particlesContainer"></div>

    <!-- ===== هدر ===== -->
    <header class="profile-header">
        <a href="/" class="logo">
            <img src="/assets/smart3.png" alt="Barghino Logo" class="logo-img">
            پروفایل Barghino
        </a>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <a href="/dashboard" class="header-btn">🔌 بازگشت به داشبورد</a>
            <a href="/" class="header-btn">🏠 صفحه اصلی</a>
        </div>
    </header>

    <!-- ===== محتوای اصلی ===== -->
    <main class="profile-main">
        <div class="profile-card">
            <div class="profile-avatar" id="profileAvatar">U</div>
            <h2 class="profile-name" id="profileName">کاربر</h2>
            <p class="profile-username" id="profileUsername">@username</p>

            <div class="stats-grid">
                <div class="stat-item">
                    <div class="number" id="weeklyConsumption">0</div>
                    <div class="label">📊 مصرف هفتگی (کیلووات)</div>
                </div>
                <div class="stat-item">
                    <div class="number" id="monthlyConsumption">0</div>
                    <div class="label">📊 مصرف ماهانه (کیلووات)</div>
                </div>
                <div class="stat-item">
                    <div class="number" id="yearlyConsumption">0</div>
                    <div class="label">📊 مصرف سالانه (کیلووات)</div>
                </div>
                <div class="stat-item">
                    <div class="number saving-number" id="savingAmount">0</div>
                    <div class="label">💰 صرفه‌جویی سالانه (تومان)</div>
                </div>
            </div>

            <div class="chart-buttons">
                <button class="chart-btn active" data-chart="weekly">هفتگی</button>
                <button class="chart-btn" data-chart="monthly">ماهانه</button>
                <button class="chart-btn" data-chart="yearly">سالانه</button>
            </div>

            <div class="chart-container">
                <canvas id="consumptionChart"></canvas>
            </div>
        </div>
    </main>

    <div class="copyright">© 2026 Barghino | سازنده ربات پارسا گودرزی | طراحی و ساخت سایت نیکان نظری</div>

    <!-- ============================================================ -->
    <!-- ===== اسکریپت ===== -->
    <!-- ============================================================ -->
    <script>
        // ===================================================================
        // 1. پس‌زمینه مدار (Circuit Background)
        // ===================================================================
        const canvas = document.getElementById('circuitCanvas');
        const ctx = canvas.getContext('2d');
        let nodes = [],
            connections = [];

        function resizeCanvas() {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            genCircuit();
        }

        function genCircuit() {
            nodes = [];
            connections = [];
            for (let i = 0; i < 40; i++) nodes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                radius: Math.random() * 2 + 1.5,
                pulse: Math.random() * Math.PI * 2
            });
            for (let i = 0; i < nodes.length; i++)
                for (let j = i + 1; j < nodes.length; j++) {
                    let d = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
                    if (d < 120) connections.push({ a: i, b: j, maxDist: 120 });
                }
        }

        function drawCircuit() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const lineColor = 'rgba(0, 229, 255, 0.4)';
            const nodeColor = 'rgba(0, 229, 255, 0.6)';

            nodes.forEach(n => {
                n.x += n.vx;
                n.y += n.vy;
                if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
                if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
                n.pulse += 0.02;
            });
            connections.forEach(c => {
                let a = nodes[c.a],
                    b = nodes[c.b],
                    d = Math.hypot(a.x - b.x, a.y - b.y),
                    op = Math.max(0, 0.3 * (1 - d / c.maxDist));
                if (op > 0.01) {
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.strokeStyle = lineColor;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            });
            nodes.forEach(n => {
                let s = 1 + Math.sin(n.pulse) * 0.4;
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.radius * s, 0, Math.PI * 2);
                ctx.fillStyle = nodeColor;
                ctx.fill();
            });
            requestAnimationFrame(drawCircuit);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawCircuit();

        // ===================================================================
        // 2. ذرات (Particles)
        // ===================================================================
        const particlesContainer = document.getElementById('particlesContainer');

        function createParticle() {
            let p = document.createElement('div');
            p.className = 'particle';
            let s = Math.random() * 4 + 2;
            p.style.width = s + 'px';
            p.style.height = s + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.bottom = '-20px';
            p.style.animationDuration = Math.random() * 10 + 6 + 's';
            particlesContainer.appendChild(p);
            p.addEventListener('animationend', () => p.remove());
        }

        setInterval(() => {
            if (particlesContainer.children.length < 35) createParticle();
        }, 400);
        for (let i = 0; i < 15; i++) setTimeout(createParticle, i * 150);

        // ===================================================================
        // 3. اطلاعات کاربر از localStorage
        // ===================================================================
        const currentUser = JSON.parse(localStorage.getItem('barghino_current_user') || 'null');
        const username = currentUser ? currentUser.username : 'کاربر';

        document.getElementById('profileAvatar').textContent = username.charAt(0).toUpperCase();
        document.getElementById('profileName').textContent = username;
        document.getElementById('profileUsername').textContent = '@' + username;

        // ===================================================================
        // 4. داده‌های مصرف (از localStorage یا مقدار پیش‌فرض)
        // ===================================================================
        const savedWeekly = parseInt(localStorage.getItem('barghino_weekly') || '420');
        const savedMonthly = parseInt(localStorage.getItem('barghino_monthly') || '1800');
        const savedYearly = parseInt(localStorage.getItem('barghino_yearly') || '22000');

        document.getElementById('weeklyConsumption').textContent = savedWeekly;
        document.getElementById('monthlyConsumption').textContent = savedMonthly;
        document.getElementById('yearlyConsumption').textContent = savedYearly;

        // صرفه‌جویی سالانه (بین ۷ تا ۸ میلیون تومان)
        const saving = 7500000 + Math.floor(Math.random() * 500000);
        document.getElementById('savingAmount').textContent = saving.toLocaleString('fa-IR');

        // ===================================================================
        // 5. داده‌های نمودار (مصرف واقعی)
        // ===================================================================
        const weeklyData = [120, 95, 110, 85, 130, 100, 75];
        const monthlyData = [450, 380, 420, 350, 480, 400, 320, 370, 410, 360, 430, 390];
        const yearlyData = [5200, 4800, 5100, 4900, 5300, 4700, 5000, 4600, 5400, 4800, 5200, 4700];
        const weeklyLabels = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];
        const monthlyLabels = ['فروردین', 'اردیبهشت', 'خرداد', 'تیر', 'مرداد', 'شهریور', 'مهر', 'آبان', 'آذر', 'دی', 'بهمن', 'اسفند'];
        const yearlyLabels = ['1400', '1401', '1402', '1403', '1404', '1405', '1406', '1407', '1408', '1409', '1410', '1411'];

        // ===================================================================
        // 6. رسم نمودار
        // ===================================================================
        const chartCanvas = document.getElementById('consumptionChart');
        const chartCtx = chartCanvas.getContext('2d');
        let currentChart = 'weekly';

        function drawChart(data, labels, color) {
            const w = chartCanvas.width = chartCanvas.offsetWidth;
            const h = chartCanvas.height = chartCanvas.offsetHeight;

            chartCtx.clearRect(0, 0, w, h);

            if (data.length === 0) return;

            const padding = 40;
            const graphW = w - padding * 2;
            const graphH = h - padding * 2;
            const maxVal = Math.max(...data) * 1.2;
            const step = graphW / (data.length - 1);

            chartCtx.beginPath();
            chartCtx.strokeStyle = color || '#00e5ff';
            chartCtx.lineWidth = 2.5;
            chartCtx.shadowColor = color || '#00e5ff';
            chartCtx.shadowBlur = 8;

            data.forEach((val, i) => {
                const x = padding + i * step;
                const y = padding + graphH - (val / maxVal) * graphH;
                if (i === 0) chartCtx.moveTo(x, y);
                else chartCtx.lineTo(x, y);
            });
            chartCtx.stroke();

            chartCtx.shadowBlur = 0;
            chartCtx.lineTo(padding + (data.length - 1) * step, padding + graphH);
            chartCtx.lineTo(padding, padding + graphH);
            chartCtx.closePath();

            const gradient = chartCtx.createLinearGradient(0, padding, 0, padding + graphH);
            gradient.addColorStop(0, (color || '#00e5ff') + '33');
            gradient.addColorStop(1, (color || '#00e5ff') + '05');
            chartCtx.fillStyle = gradient;
            chartCtx.fill();

            // برچسب‌ها
            chartCtx.fillStyle = '#8899aa';
            chartCtx.font = '10px sans-serif';
            chartCtx.textAlign = 'center';
            labels.forEach((label, i) => {
                const x = padding + i * step;
                chartCtx.fillText(label, x, h - 8);
            });

            // مقادیر
            chartCtx.fillStyle = '#00e5ff';
            chartCtx.font = '10px sans-serif';
            data.forEach((val, i) => {
                const x = padding + i * step;
                const y = padding + graphH - (val / maxVal) * graphH - 8;
                chartCtx.fillText(val, x, y);
            });
        }

        function updateChart(type) {
            currentChart = type;
            if (type === 'weekly') {
                drawChart(weeklyData, weeklyLabels, '#00e5ff');
            } else if (type === 'monthly') {
                drawChart(monthlyData, monthlyLabels, '#00ff88');
            } else {
                drawChart(yearlyData, yearlyLabels, '#ffb700');
            }
        }

        // ===================================================================
        // 7. دکمه‌های تغییر بازه
        // ===================================================================
        document.querySelectorAll('.chart-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.chart-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                updateChart(this.dataset.chart);
            });
        });

        // ===================================================================
        // 8. اجرای اولیه
        // ===================================================================
        setTimeout(() => {
            updateChart('weekly');
        }, 100);

        window.addEventListener('resize', () => {
            updateChart(currentChart);
        });

        // ===================================================================
        // 9. بازگشت به داشبورد
        // ===================================================================
        document.querySelector('a[href="/dashboard"]').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = '/dashboard';
        });
    </script>
</body>
</html>
