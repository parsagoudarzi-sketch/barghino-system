<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barghino | ورود</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-deep: #0a0e17;
            --bg-gradient-start: #0a0e17;
            --bg-gradient-end: #0d121e;
            --bg-card: #111827cc;
            --cyan: #00e5ff;
            --cyan-glow: #00e5ff66;
            --green: #00ff88;
            --red: #ff4757;
            --gold: #ffb700;
            --border: #1e2d40;
            --input-bg: #1a1f2e;
            --text-primary: #ffffff;
            --text-muted: #8899aa;
            --shadow-sm: 0 10px 25px -5px rgba(0,0,0,0.3);
            --shadow-md: 0 20px 25px -5px rgba(0,0,0,0.4);
            --shadow-glow: 0 0 40px rgba(0,229,255,0.15);
        }
        body {
            font-family: 'Segoe UI', 'Vazirmatn', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== پس‌زمینه متحرک ===== */
        .circuit-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 12px var(--cyan-glow);
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-110vh) scale(0.2); opacity: 0; }
        }

        /* ===== کارت لاگین ===== */
        .login-wrapper {
            position: relative;
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 32px;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            padding: 2.5rem 2.2rem;
            width: 400px;
            max-width: 95vw;
        }
        .login-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
            border-color: var(--cyan);
        }
        .card-top-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1.8rem;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--green);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--green);
            animation: statusPulse 2s infinite;
        }
        @keyframes statusPulse {
            0%, 100% { box-shadow: 0 0 10px var(--green); }
            50% { box-shadow: 0 0 18px #fff, 0 0 30px var(--green); }
        }
        .login-title {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.3rem;
            text-align: center;
        }
        .login-subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 0.85rem;
            margin-bottom: 2rem;
        }

        /* ===== ورودی‌ها ===== */
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-group label {
            display: block;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-icon {
            position: absolute;
            right: 16px;
            color: var(--text-muted);
            font-size: 1.1rem;
            pointer-events: none;
        }
        .input-group input {
            width: 100%;
            padding: 14px 44px 14px 16px;
            background: var(--input-bg);
            border: 1.5px solid var(--border);
            border-radius: 20px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
        }
        .input-group input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px var(--cyan-glow);
        }
        .toggle-password {
            position: absolute;
            left: 14px;
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
        }

        /* ===== دکمه‌ها ===== */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow-sm);
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }
        .shop-link-btn {
            display: block;
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-primary);
            border-radius: 24px;
            cursor: pointer;
            margin-top: 0.8rem;
            transition: all 0.3s;
            font-weight: 500;
            text-align: center;
            text-decoration: none;
        }
        .shop-link-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0,229,255,0.05);
        }
        .error-msg {
            color: var(--red);
            text-align: center;
            margin-top: 0.5rem;
        }
        .copyright {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.7rem;
            padding: 1rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
        }
    </style>
</head>
<body>

    <!-- ===== پس‌زمینه متحرک ===== -->
    <div class="circuit-bg"><canvas id="circuitCanvas"></canvas></div>
    <div class="particles" id="particlesContainer"></div>

    <!-- ===== صفحه لاگین ===== -->
    <div class="login-wrapper">
        <div class="login-card">
            <div class="card-top-bar">
                <div class="status-dot"></div>
                <span>سیستم فعال</span>
            </div>
            <h2 class="login-title">ورود به Barghino</h2>
            <p class="login-subtitle">مدیریت هوشمند <span style="color:var(--cyan);">انرژی</span></p>
            <form id="loginForm" autocomplete="off">
                <div class="input-group">
                    <label>👤 نام کاربری</label>
                    <div class="input-wrapper">
                        <input type="text" id="username" placeholder="admin">
                        <span class="input-icon">📧</span>
                    </div>
                </div>
                <div class="input-group">
                    <label>🔒 رمز عبور</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="••••">
                        <span class="input-icon">🔑</span>
                        <button type="button" class="toggle-password" id="togglePass">👁️</button>
                    </div>
                </div>
                <button type="submit" class="login-btn">⚡ ورود</button>
                <div class="error-msg" id="errorMsg"></div>
            </form>
            <a href="/register" class="shop-link-btn">📝 ثبت‌نام</a>
            <button class="shop-link-btn" id="goShopFromLogin">🛒 فروشگاه</button>
            <button class="shop-link-btn" id="goProductFromLogin">📖 درباره Barghino</button>
            <button class="shop-link-btn" id="backToLanding" style="border-color:var(--cyan);color:var(--cyan);">🏠 بازگشت به صفحه اصلی</button>
        </div>
        <div class="copyright">© 2026 Barghino | سازنده ربات پارسا گودرزی | طراحی و ساخت سایت نیکان نظری</div>
    </div>

    <!-- ============================================================ -->
    <!-- ===== اسکریپت ===== -->
    <!-- ============================================================ -->
    <script>
        // ===================================================================
        // 1. پس‌زمینه مدار (Circuit Background)
        // ===================================================================
        const canvas = document.getElementById('circuitCanvas');
        const ctx = canvas.getContext('2d');
        let nodes = [], connections = [];

        function resizeCanvas() {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            genCircuit();
        }

        function genCircuit() {
            nodes = [];
            connections = [];
            for (let i = 0; i < 40; i++) nodes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                radius: Math.random() * 2 + 1.5,
                pulse: Math.random() * Math.PI * 2
            });
            for (let i = 0; i < nodes.length; i++)
                for (let j = i + 1; j < nodes.length; j++) {
                    let d = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
                    if (d < 120) connections.push({ a: i, b: j, maxDist: 120 });
                }
        }

        function drawCircuit() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const lineColor = 'rgba(0, 229, 255, 0.4)';
            const nodeColor = 'rgba(0, 229, 255, 0.6)';

            nodes.forEach(n => {
                n.x += n.vx;
                n.y += n.vy;
                if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
                if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
                n.pulse += 0.02;
            });
            connections.forEach(c => {
                let a = nodes[c.a], b = nodes[c.b], d = Math.hypot(a.x - b.x, a.y - b.y), op = Math.max(0, 0.3 * (1 - d / c.maxDist));
                if (op > 0.01) {
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.strokeStyle = lineColor;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            });
            nodes.forEach(n => {
                let s = 1 + Math.sin(n.pulse) * 0.4;
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.radius * s, 0, Math.PI * 2);
                ctx.fillStyle = nodeColor;
                ctx.fill();
            });
            requestAnimationFrame(drawCircuit);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawCircuit();

        // ===================================================================
        // 2. ذرات (Particles)
        // ===================================================================
        const particlesContainer = document.getElementById('particlesContainer');

        function createParticle() {
            let p = document.createElement('div');
            p.className = 'particle';
            let s = Math.random() * 4 + 2;
            p.style.width = s + 'px';
            p.style.height = s + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.bottom = '-20px';
            p.style.animationDuration = Math.random() * 10 + 6 + 's';
            particlesContainer.appendChild(p);
            p.addEventListener('animationend', () => p.remove());
        }

        setInterval(() => {
            if (particlesContainer.children.length < 35) createParticle();
        }, 400);
        for (let i = 0; i < 15; i++) setTimeout(createParticle, i * 150);

        // ===================================================================
        // 3. لاگین
        // ===================================================================
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const err = document.getElementById('errorMsg');

            const users = JSON.parse(localStorage.getItem('barghino_users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);

            if (user) {
                err.textContent = '';
                localStorage.setItem('barghino_current_user', JSON.stringify({ username }));
                window.location.href = '/dashboard';
            } else {
                err.textContent = '❌ نام کاربری یا رمز عبور اشتباه است';
            }
        });

        document.getElementById('togglePass').addEventListener('click', () => {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        });

        // ===================================================================
        // 4. دکمه‌های ناوبری
        // ===================================================================
        document.getElementById('goShopFromLogin').addEventListener('click', () => {
            window.location.href = '/shop';
        });
        document.getElementById('goProductFromLogin').addEventListener('click', () => {
            window.location.href = '/product';
        });
        document.getElementById('backToLanding').addEventListener('click', () => {
            window.location.href = '/';
        });
    </script>
</body>
</html>
