<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barghino | فروشگاه</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-deep: #0a0e17;
            --bg-gradient-start: #0a0e17;
            --bg-gradient-end: #0d121e;
            --bg-card: #111827cc;
            --cyan: #00e5ff;
            --cyan-glow: #00e5ff66;
            --green: #00ff88;
            --red: #ff4757;
            --gold: #ffb700;
            --border: #1e2d40;
            --input-bg: #1a1f2e;
            --text-primary: #ffffff;
            --text-muted: #8899aa;
            --shadow-sm: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
            --shadow-glow: 0 0 40px rgba(0, 229, 255, 0.15);
        }
        body {
            font-family: 'Segoe UI', 'Vazirmatn', 'Tahoma', sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* ===== پس‌زمینه متحرک ===== */
        .circuit-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.3;
        }
        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }
        .particle {
            position: absolute;
            border-radius: 50%;
            background: var(--cyan);
            box-shadow: 0 0 12px var(--cyan-glow);
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-110vh) scale(0.2); opacity: 0; }
        }

        /* ===== هدر ===== */
        .shop-header {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            flex-wrap: wrap;
            gap: 1rem;
            position: relative;
            z-index: 10;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
        }
        .logo-space {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: rgba(255,255,255,0.05);
            border: 2px dashed rgba(255,255,255,0.2);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: rgba(255,255,255,0.3);
            margin-left: 8px;
        }
        .back-btn {
            display: inline-block;
            padding: 8px 20px;
            background: transparent;
            border: 1.5px solid var(--border);
            color: var(--text-primary);
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            text-decoration: none;
        }
        .back-btn:hover {
            border-color: var(--cyan);
            color: var(--cyan);
            background: rgba(0, 229, 255, 0.05);
        }

        /* ===== فروشگاه ===== */
        .shop-main {
            position: relative;
            z-index: 10;
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .shop-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }
        .product-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 1.5rem;
            text-align: center;
            transition: all 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-glow);
            border-color: var(--cyan);
        }
        .product-icon {
            font-size: 3.5rem;
            margin-bottom: 0.5rem;
        }
        .product-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
        }
        .product-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.8rem;
        }
        .product-price {
            color: var(--cyan);
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }
        .add-to-cart {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, var(--cyan), var(--green));
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .add-to-cart:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-glow);
        }

        .copyright {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.7rem;
            padding: 1rem;
            border-top: 1px solid var(--border);
            margin-top: 2rem;
            position: relative;
            z-index: 10;
        }

        @media (max-width: 768px) {
            .shop-header {
                flex-direction: column;
                text-align: center;
            }
            .products-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 480px) {
            .products-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ===== پس‌زمینه متحرک ===== -->
    <div class="circuit-bg"><canvas id="circuitCanvas"></canvas></div>
    <div class="particles" id="particlesContainer"></div>

    <!-- ===== هدر فروشگاه ===== -->
    <header class="shop-header">
        <a href="/" class="logo"><span class="logo-space">لوگو</span>🛒 فروشگاه Barghino</a>
        <div>
            <a href="/" class="back-btn">🏠 صفحه اصلی</a>
            <a href="/login" class="back-btn" style="margin-right:0.5rem;">🔑 ورود</a>
        </div>
    </header>

    <!-- ===== محتوای فروشگاه ===== -->
    <main class="shop-main">
        <h1 class="shop-title">🛒 محصولات Barghino</h1>
        <div class="products-grid" id="productsContainer">
            <!-- محصولات توسط جاوااسکریپت ساخته میشن -->
        </div>
    </main>

    <div class="copyright">© 2026 Barghino | سازنده ربات پارسا گودرزی | طراحی و ساخت سایت نیکان نظری</div>

    <!-- ============================================================ -->
    <!-- ===== اسکریپت ===== -->
    <!-- ============================================================ -->
    <script>
        // ===================================================================
        // 1. پس‌زمینه مدار (Circuit Background)
        // ===================================================================
        const canvas = document.getElementById('circuitCanvas');
        const ctx = canvas.getContext('2d');
        let nodes = [], connections = [];

        function resizeCanvas() {
            canvas.width = innerWidth;
            canvas.height = innerHeight;
            genCircuit();
        }

        function genCircuit() {
            nodes = [];
            connections = [];
            for (let i = 0; i < 40; i++) nodes.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                radius: Math.random() * 2 + 1.5,
                pulse: Math.random() * Math.PI * 2
            });
            for (let i = 0; i < nodes.length; i++)
                for (let j = i + 1; j < nodes.length; j++) {
                    let d = Math.hypot(nodes[i].x - nodes[j].x, nodes[i].y - nodes[j].y);
                    if (d < 120) connections.push({ a: i, b: j, maxDist: 120 });
                }
        }

        function drawCircuit() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const lineColor = 'rgba(0, 229, 255, 0.4)';
            const nodeColor = 'rgba(0, 229, 255, 0.6)';

            nodes.forEach(n => {
                n.x += n.vx;
                n.y += n.vy;
                if (n.x < 0 || n.x > canvas.width) n.vx *= -1;
                if (n.y < 0 || n.y > canvas.height) n.vy *= -1;
                n.pulse += 0.02;
            });
            connections.forEach(c => {
                let a = nodes[c.a], b = nodes[c.b], d = Math.hypot(a.x - b.x, a.y - b.y), op = Math.max(0, 0.3 * (1 - d / c.maxDist));
                if (op > 0.01) {
                    ctx.beginPath();
                    ctx.moveTo(a.x, a.y);
                    ctx.lineTo(b.x, b.y);
                    ctx.strokeStyle = lineColor;
                    ctx.lineWidth = 0.8;
                    ctx.stroke();
                }
            });
            nodes.forEach(n => {
                let s = 1 + Math.sin(n.pulse) * 0.4;
                ctx.beginPath();
                ctx.arc(n.x, n.y, n.radius * s, 0, Math.PI * 2);
                ctx.fillStyle = nodeColor;
                ctx.fill();
            });
            requestAnimationFrame(drawCircuit);
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
        drawCircuit();

        // ===================================================================
        // 2. ذرات (Particles)
        // ===================================================================
        const particlesContainer = document.getElementById('particlesContainer');

        function createParticle() {
            let p = document.createElement('div');
            p.className = 'particle';
            let s = Math.random() * 4 + 2;
            p.style.width = s + 'px';
            p.style.height = s + 'px';
            p.style.left = Math.random() * 100 + '%';
            p.style.bottom = '-20px';
            p.style.animationDuration = Math.random() * 10 + 6 + 's';
            particlesContainer.appendChild(p);
            p.addEventListener('animationend', () => p.remove());
        }

        setInterval(() => {
            if (particlesContainer.children.length < 35) createParticle();
        }, 400);
        for (let i = 0; i < 15; i++) setTimeout(createParticle, i * 150);

        // ===================================================================
        // 3. محصولات
        // ===================================================================
        const products = [
            { id: 1, name: 'دستگاه مرکزی', icon: '🧠', desc: 'هسته اصلی سیستم کنترل هوشمند', price: '۹۹۰,۰۰۰' },
            { id: 2, name: 'کلید هوشمند', icon: '🔑', desc: 'کنترل هر پریز به صورت جداگانه', price: '۶۵۰,۰۰۰' },
            { id: 3, name: 'پک کامل برقینو', icon: '📦', desc: 'همه چیز برای راه‌اندازی کامل', price: '۱,۳۰۰,۰۰۰' },
            { id: 4, name: 'تغذیه دستگاه مرکزی', icon: '🔋', desc: 'منبع تغذیه اختصاصی', price: '۸۵,۰۰۰' },
            { id: 5, name: 'پک ویژه برقینو', icon: '⭐', desc: 'نسخه حرفه‌ای با امکانات ویژه', price: '۲,۳۰۰,۰۰۰' }
        ];

        const container = document.getElementById('productsContainer');

        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-icon">${p.icon}</div>
                <div class="product-name">${p.name}</div>
                <div class="product-desc">${p.desc}</div>
                <div class="product-price">${p.price} تومان</div>
                <button class="add-to-cart" data-id="${p.id}">➕ افزودن به سبد</button>
            `;
            container.appendChild(card);
        });

        // ===================================================================
        // 4. دکمه افزودن به سبد
        // ===================================================================
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', function() {
                const productName = this.closest('.product-card').querySelector('.product-name').textContent;
                const productPrice = this.closest('.product-card').querySelector('.product-price').textContent;
                alert(`🛒 ${productName} با قیمت ${productPrice} به سبد خرید اضافه شد!`);
            });
        });
    </script>
</body>
</html>
